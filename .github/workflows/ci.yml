name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test-service-a:
    name: Service A - Java Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: service-a-library
        run: mvn test

  test-service-b:
    name: Service B - Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        working-directory: service-b-loans
        run: go test ./... -v
